<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="color-scheme" content="light" />
  <meta name="theme-color" content="#f6f4f0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Supper Club" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="assets/images/icon.png" />
  <link rel="apple-touch-icon" href="assets/images/icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <title>Supper Club</title>
</head>
<body>

  <!-- ============ HOME VIEW ============ -->
  <section id="view-home" class="view view--active">
    <header class="home-header">
      <img src="assets/images/logo.png" alt="Supper Club" class="logo" />
      <!-- Google Drive button: sign-in when disconnected, sync dot when connected -->
      <button type="button" class="gdrive-home-btn" id="gdrive-home-btn" aria-label="Google Drive sync"></button>
    </header>


    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      <input type="search" id="search-input" placeholder="Search recipes" autocomplete="off" />
    </div>

    <div class="filter-chips" id="filter-chips"></div>

    <div class="list-toolbar" id="list-toolbar">
      <div class="list-toolbar__views">
        <button type="button" class="tool-btn tool-btn--active" id="view-list-btn" aria-label="List view">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <button type="button" class="tool-btn" id="view-grid-btn" aria-label="Grid view">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="8" height="8" rx="1"/><rect x="13" y="3" width="8" height="8" rx="1"/><rect x="3" y="13" width="8" height="8" rx="1"/><rect x="13" y="13" width="8" height="8" rx="1"/></svg>
        </button>
      </div>
      <button type="button" class="tool-btn" id="sort-btn" aria-label="Sort">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M7 12h10M11 18h2"/></svg>
        <span class="tool-btn__lbl" id="sort-lbl" hidden></span>
      </button>
    </div>

    <main class="recipe-list" id="recipe-list"></main>

    <div class="empty-state" id="empty-state" hidden>
      <p class="empty-title">No recipes yet</p>
      <p class="empty-sub">Tap the plus button to add your first recipe</p>
    </div>

    <div class="empty-state" id="no-results" hidden>
      <p class="empty-title">No matches</p>
      <p class="empty-sub">Try a different search or category</p>
    </div>

    <button class="fab" id="fab-add" aria-label="Add recipe">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
    </button>
  </section>

  <!-- ============ VIEW RECIPE ============ -->
  <section id="view-recipe" class="view">
    <header class="page-header">
      <button class="icon-btn" id="recipe-back" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      </button>
      <div class="page-header__actions">
        <button class="icon-btn icon-btn--bookmark" id="recipe-bookmark" aria-label="Bookmark">
          <svg class="bookmark-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        </button>
        <button class="icon-btn icon-btn--made" id="recipe-made" aria-label="Mark as made">
          <svg class="made-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="9 12 11 14 15 10"/></svg>
        </button>
        <button class="icon-btn" id="recipe-share" aria-label="Share">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
        </button>
        <button class="icon-btn" id="recipe-edit" aria-label="Edit">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="icon-btn" id="recipe-delete" aria-label="Delete">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/></svg>
        </button>
      </div>
    </header>

    <div class="recipe-detail" id="recipe-detail"></div>
  </section>

  <!-- ============ ADD / EDIT FORM ============ -->
  <section id="view-edit" class="view">
    <header class="page-header">
      <button class="icon-btn" id="edit-cancel" aria-label="Cancel">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
      <h1 class="page-title" id="edit-title">New Recipe</h1>
      <button class="text-btn" id="edit-save">Save</button>
    </header>

    <form class="recipe-form" id="recipe-form" autocomplete="off">

      <!-- 1. Import from photo (OCR) — first -->
      <button type="button" class="import-btn" id="import-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <span>Import from photo</span>
      </button>
      <!-- multiple photos allowed for OCR -->
      <input type="file" id="import-input" accept="image/*" multiple hidden />

      <!-- 2. Meal photo(s) -->
      <!-- Empty state: large tap area -->
      <label class="image-upload" id="image-upload-empty" for="image-input">
        <div class="image-upload__preview">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-5-5L5 21"/></svg>
          <span>Add photo</span>
        </div>
      </label>
      <!-- Filled state: thumbnail strip -->
      <div class="image-strip-wrap" id="image-strip-wrap" hidden>
        <div class="image-strip" id="image-strip"></div>
      </div>
      <!-- Add more photos (visible when images exist) -->
      <label class="image-upload image-upload--more" id="image-upload-more" for="image-input" hidden>
        <div class="image-upload__preview">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-5-5L5 21"/></svg>
          <span>Add photo</span>
        </div>
      </label>
      <!-- multiple photos allowed for meal -->
      <input type="file" id="image-input" accept="image/*" multiple hidden />

      <!-- 3. Source — above title -->
      <div class="field">
        <span class="field__label">Source</span>
        <input type="text" id="source-input" class="field__input" placeholder="Link or title (optional)" inputmode="url" autocorrect="off" autocapitalize="none" />
      </div>

      <!-- 4. Title -->
      <div class="field">
        <label for="title-input" class="field__label">Title</label>
        <input type="text" id="title-input" class="field__input" placeholder="Recipe name" maxlength="120" />
      </div>

      <!-- 5. Categories -->
      <div class="field">
        <span class="field__label">Categories</span>
        <div class="category-pickers" id="category-pickers"></div>
        <div class="category-add">
          <input type="text" id="new-category-input" class="field__input" placeholder="Add a new category" maxlength="40" />
          <button type="button" class="text-btn" id="new-category-btn">Add</button>
        </div>
      </div>

      <!-- 6. Ingredients -->
      <div class="field">
        <label for="ingredients-input" class="field__label">Ingredients</label>
        <textarea id="ingredients-input" class="field__input field__input--area" rows="6" placeholder="2 eggs&#10;1 cup flour&#10;..."></textarea>
      </div>

      <!-- 7. Method -->
      <div class="field">
        <label for="method-input" class="field__label">Method</label>
        <textarea id="method-input" class="field__input field__input--area" rows="8" placeholder="Preheat the oven&#10;Mix dry ingredients&#10;..."></textarea>
      </div>

      <!-- 8. Notes -->
      <div class="field">
        <label for="notes-input" class="field__label">Notes</label>
        <textarea id="notes-input" class="field__input field__input--area" rows="3" placeholder="Optional"></textarea>
      </div>

      <div class="form-bottom-space"></div>
    </form>
  </section>

  <!-- ============ IMAGE CROPPER ============ -->
  <section id="view-cropper" class="view">
    <header class="page-header">
      <button class="icon-btn" id="cropper-cancel" aria-label="Cancel">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
      <h1 class="page-title">Crop photo</h1>
      <button class="text-btn" id="cropper-done">Done</button>
    </header>
    <div class="cropper-wrap">
      <img id="cropper-img" alt="" />
    </div>
  </section>

  <!-- ============ OCR REVIEW ============ -->
  <section id="view-ocr" class="view">
    <header class="page-header">
      <button class="icon-btn" id="ocr-cancel" aria-label="Cancel">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
      <h1 class="page-title">Imported text</h1>
      <span class="text-btn" style="visibility:hidden">Done</span>
    </header>
    <div class="ocr-wrap">
      <p class="ocr-hint">Edit the text below, then choose where to put it.</p>
      <textarea id="ocr-text" class="field__input field__input--area" rows="16" spellcheck="false"></textarea>
      <div class="ocr-actions">
        <button type="button" class="btn btn--ghost" id="ocr-to-ingredients">Use as Ingredients</button>
        <button type="button" class="btn btn--ghost" id="ocr-to-method">Use as Method</button>
      </div>
    </div>
  </section>

  <!-- ============ LOADING OVERLAY ============ -->
  <div class="loading-overlay" id="loading-overlay" hidden>
    <div class="loading-overlay__inner">
      <div class="spinner"></div>
      <p class="loading-overlay__msg" id="loading-overlay-msg">Reading recipe…</p>
    </div>
  </div>

  <!-- ============ CONFIRM (delete) ============ -->
  <section id="view-confirm" class="view">
    <div class="confirm-wrap">
      <p class="confirm-title">Delete this recipe?</p>
      <p class="confirm-sub" id="confirm-sub">This cannot be undone.</p>
      <div class="confirm-actions">
        <button class="btn btn--ghost" id="confirm-cancel">Cancel</button>
        <button class="btn btn--danger" id="confirm-ok">Delete</button>
      </div>
    </div>
  </section>


  <!-- Toast -->
  <div class="toast" id="toast" hidden></div>

  <script src="app.js"></script>
</body>
</html>
