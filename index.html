<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#f6f4f0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="LE" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="assets/images/icon.png" />
  <link rel="apple-touch-icon" href="assets/images/icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <title>LE</title>
</head>
<body>

  <!-- ============ HOME VIEW ============ -->
  <section id="view-home" class="view view--active">
    <header class="home-header">
      <img src="assets/images/logo.png" alt="LE" class="logo" />
    </header>

    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      <input type="search" id="search-input" placeholder="Search recipes, ingredients, categories" autocomplete="off" />
    </div>

    <div class="filter-chips" id="filter-chips"></div>

    <main class="recipe-list" id="recipe-list">
      <!-- Recipes injected here -->
    </main>

    <div class="empty-state" id="empty-state" hidden>
      <p class="empty-title">No recipes yet</p>
      <p class="empty-sub">Tap the plus button to add your first recipe</p>
    </div>

    <div class="empty-state" id="no-results" hidden>
      <p class="empty-title">No matches</p>
      <p class="empty-sub">Try a different search or category</p>
    </div>

    <button class="fab" id="fab-add" aria-label="Add recipe">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
    </button>
  </section>

  <!-- ============ VIEW RECIPE ============ -->
  <section id="view-recipe" class="view">
    <header class="page-header">
      <button class="icon-btn" id="recipe-back" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      </button>
      <div class="page-header__actions">
        <button class="icon-btn" id="recipe-share" aria-label="Share">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
        </button>
        <button class="icon-btn" id="recipe-edit" aria-label="Edit">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="icon-btn" id="recipe-delete" aria-label="Delete">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/></svg>
        </button>
      </div>
    </header>

    <div class="recipe-detail" id="recipe-detail">
      <!-- Content injected here -->
    </div>
  </section>

  <!-- ============ ADD / EDIT FORM ============ -->
  <section id="view-edit" class="view">
    <header class="page-header">
      <button class="icon-btn" id="edit-cancel" aria-label="Cancel">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
      <h1 class="page-title" id="edit-title">New Recipe</h1>
      <button class="text-btn" id="edit-save">Save</button>
    </header>

    <form class="recipe-form" id="recipe-form" autocomplete="off">
      <label class="image-upload" for="image-input">
        <div class="image-upload__preview" id="image-preview">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-5-5L5 21"/></svg>
          <span>Add photo</span>
        </div>
        <input type="file" id="image-input" accept="image/*" hidden />
      </label>
      <button type="button" class="image-remove" id="image-remove" hidden>Remove photo</button>

      <div class="field">
        <label for="title-input" class="field__label">Title</label>
        <input type="text" id="title-input" class="field__input" placeholder="Recipe name" maxlength="120" />
      </div>

      <div class="field">
        <span class="field__label">Categories</span>
        <div class="category-pickers" id="category-pickers"></div>
        <div class="category-add">
          <input type="text" id="new-category-input" class="field__input" placeholder="Add a new category" maxlength="40" />
          <button type="button" class="text-btn" id="new-category-btn">Add</button>
        </div>
      </div>

      <div class="field">
        <label for="ingredients-input" class="field__label">Ingredients</label>
        <p class="field__hint">One per line</p>
        <textarea id="ingredients-input" class="field__input field__input--area" rows="6" placeholder="2 eggs&#10;1 cup flour&#10;..."></textarea>
      </div>

      <div class="field">
        <label for="method-input" class="field__label">Method</label>
        <p class="field__hint">One step per line</p>
        <textarea id="method-input" class="field__input field__input--area" rows="8" placeholder="Preheat the oven&#10;Mix dry ingredients&#10;..."></textarea>
      </div>

      <div class="field">
        <label for="notes-input" class="field__label">Notes</label>
        <textarea id="notes-input" class="field__input field__input--area" rows="3" placeholder="Optional"></textarea>
      </div>

      <div class="form-bottom-space"></div>
    </form>
  </section>

  <!-- ============ CONFIRM (delete) ============ -->
  <section id="view-confirm" class="view">
    <div class="confirm-wrap">
      <p class="confirm-title">Delete this recipe?</p>
      <p class="confirm-sub" id="confirm-sub">This cannot be undone.</p>
      <div class="confirm-actions">
        <button class="btn btn--ghost" id="confirm-cancel">Cancel</button>
        <button class="btn btn--danger" id="confirm-ok">Delete</button>
      </div>
    </div>
  </section>

  <!-- Toast -->
  <div class="toast" id="toast" hidden></div>

  <script src="app.js"></script>
</body>
</html>
